<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的雲端記帳本</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary-color: #4facfe;
            --secondary-color: #00f2fe;
            --bg-color: #f5f7fa;
            --text-color: #333;
            --card-bg: #ffffff;
        }

        body {
            font-family: 'Noto Sans TC', sans-serif;
            background: linear-gradient(135deg, var(--primary-color) 0%, var(--secondary-color) 100%);
            background-attachment: fixed;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: var(--text-color);
        }

        .container {
            width: 90%;
            max-width: 420px;
            background: var(--card-bg);
            padding: 30px;
            border-radius: 24px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
            animation: fadeIn 0.6s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .header {
            text-align: center;
            margin-bottom: 25px;
        }

        .header i {
            font-size: 40px;
            color: var(--primary-color);
            margin-bottom: 10px;
        }

        .header h2 {
            margin: 0;
            font-weight: 700;
            color: #444;
            letter-spacing: 1px;
        }

        .form-group {
            margin-bottom: 18px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #666;
            font-size: 14px;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-wrapper i {
            position: absolute;
            left: 12px;
            color: #aaa;
            transition: 0.3s;
        }

        input, select {
            width: 100%;
            padding: 12px 12px 12px 40px;
            border: 2px solid #eee;
            border-radius: 12px;
            font-size: 16px;
            transition: all 0.3s ease;
            outline: none;
            box-sizing: border-box;
        }

        input:focus, select:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 8px rgba(79, 172, 254, 0.2);
        }

        input:focus + i, select:focus + i {
            color: var(--primary-color);
        }

        button {
            width: 100%;
            padding: 14px;
            margin-top: 10px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(to right, #4facfe 0%, #00f2fe 100%);
            color: white;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        button:active {
            transform: scale(0.98);
        }

        button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .footer-note {
            text-align: center;
            font-size: 12px;
            color: #999;
            margin-top: 20px;
        }

        /* 成功提示動畫 */
        .success-overlay {
            display: none;
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #2ecc71;
            color: white;
            padding: 10px 25px;
            border-radius: 50px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            z-index: 1000;
        }
    </style>
</head>
<body>

    <div id="successMsg" class="success-overlay">
        <i class="fas fa-check-circle"></i> 紀錄已同步至 Google Sheets
    </div>

    <div class="container">
        <div class="header">
            <i class="fas fa-wallet"></i>
            <h2>每日收支紀錄</h2>
        </div>

        <form id="expenseForm">
            <div class="form-group">
                <label>消費項目</label>
                <div class="input-wrapper">
                    <i class="fas fa-tag"></i>
                    <input type="text" id="item" placeholder="例如：7-11 咖啡" required>
                </div>
            </div>

            <div class="form-group">
                <label>類別名稱</label>
                <div class="input-wrapper">
                    <i class="fas fa-layer-group"></i>
                    <select id="category">
                        <option value="餐飲美食">餐飲美食</option>
                        <option value="交通出行">交通出行</option>
                        <option value="生活用品">生活用品</option>
                        <option value="娛樂休閒">娛樂休閒</option>
                        <option value="居家房租">居家房租</option>
                        <option value="其他支出">其他支出</option>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label>金額 (TWD)</label>
                <div class="input-wrapper">
                    <i class="fas fa-dollar-sign"></i>
                    <input type="number" id="amount" placeholder="0" inputmode="numeric" required>
                </div>
            </div>

            <div class="form-group">
                <label>備註資訊</label>
                <div class="input-wrapper">
                    <i class="fas fa-comment-dots"></i>
                    <input type="text" id="note" placeholder="可選填...">
                </div>
            </div>

            <button type="submit" id="submitBtn">
                <i class="fas fa-paper-plane"></i> <span>確認送出</span>
            </button>
        </form>

        <div class="footer-note">
            雲端數據自動同步中
        </div>
    </div>

    <script>
        // ！！！請將下方網址替換成你的 Google Apps Script 部署網址 ！！！
        const webAppUrl = 'https://script.google.com/macros/s/AKfycbxYYnLHDIHjoJBUUotKR67TOP9bYAfYVWGwHmn1kRF_s1rliB0Rn_Cxhntnh_pQf5Uu/exec';

        document.getElementById('expenseForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const btnText = btn.querySelector('span');
            const successMsg = document.getElementById('successMsg');
            
            btn.disabled = true;
            btnText.innerText = '傳送中...';

            const params = new URLSearchParams();
            params.append('item', document.getElementById('item').value);
            params.append('category', document.getElementById('category').value);
            params.append('amount', document.getElementById('amount').value);
            params.append('note', document.getElementById('note').value);

            fetch(webAppUrl, {
                method: 'POST',
                mode: 'no-cors',
                body: params
            }).then(() => {
                // 成功動畫回饋
                successMsg.style.display = 'block';
                setTimeout(() => { successMsg.style.display = 'none'; }, 3000);
                
                document.getElementById('expenseForm').reset();
                btn.disabled = false;
                btnText.innerText = '確認送出';
            }).catch(err => {
                console.error(err);
                alert('傳送失敗，請確認網址或網路狀態');
                btn.disabled = false;
                btnText.innerText = '確認送出';
            });
        });
    </script>
</body>
</html>
