<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的雲端記帳本 V2</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary-color: #4facfe;
            --secondary-color: #00f2fe;
            --bg-color: #f5f7fa;
            --text-color: #333;
            --card-bg: #ffffff;
            --accent-color: #ff9a9e;
        }

        body {
            font-family: 'Noto Sans TC', sans-serif;
            background: linear-gradient(135deg, var(--primary-color) 0%, var(--secondary-color) 100%);
            background-attachment: fixed;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: var(--text-color);
        }

        .container {
            width: 90%;
            max-width: 420px;
            background: var(--card-bg);
            padding: 30px;
            border-radius: 24px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
        }

        .header h2 { margin: 5px 0; font-weight: 700; color: #444; }

        /* 快捷按鈕樣式 */
        .quick-actions {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .quick-btn {
            background: #f0f2f5;
            border: 2px solid transparent;
            padding: 8px 15px;
            border-radius: 50px;
            font-size: 14px;
            font-weight: 500;
            color: #555;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .quick-btn:hover { background: #e4e6e9; }
        .quick-btn:active { transform: scale(0.95); border-color: var(--primary-color); }
        .quick-btn i { color: var(--primary-color); }

        .form-group { margin-bottom: 18px; }
        label { display: block; margin-bottom: 8px; font-weight: 500; color: #666; font-size: 14px; }

        .input-wrapper { position: relative; display: flex; align-items: center; }
        .input-wrapper i { position: absolute; left: 12px; color: #aaa; }

        input, select {
            width: 100%;
            padding: 12px 12px 12px 40px;
            border: 2px solid #eee;
            border-radius: 12px;
            font-size: 16px;
            outline: none;
            box-sizing: border-box;
        }

        input:focus, select:focus { border-color: var(--primary-color); }

        button#submitBtn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(to right, #4facfe 0%, #00f2fe 100%);
            color: white;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        .success-overlay {
            display: none;
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #2ecc71;
            color: white;
            padding: 10px 25px;
            border-radius: 50px;
            z-index: 1000;
        }
    </style>
</head>
<body>

    <div id="successMsg" class="success-overlay">
        <i class="fas fa-check-circle"></i> 紀錄成功！
    </div>

    <div class="container">
        <div class="header">
            <i class="fas fa-bolt" style="color: #f1c40f; font-size: 24px;"></i>
            <h2>快速記帳</h2>
        </div>

        <div class="quick-actions">
            <button type="button" class="quick-btn" onclick="quickFill('三餐', '餐飲美食')">
                <i class="fas fa-utensils"></i> 三餐
            </button>
            <button type="button" class="quick-btn" onclick="quickFill('零食', '餐飲美食')">
                <i class="fas fa-cookie-bite"></i> 零食
            </button>
            <button type="button" class="quick-btn" onclick="quickFill('計程車', '交通出行')">
                <i class="fas fa-taxi"></i> 計程車
            </button>
            <button type="button" class="quick-btn" onclick="quickFill('宥善', '其他支出')">
                <i class="fas fa-user"></i> 宥善
            </button>
        </div>

        <form id="expenseForm">
            <div class="form-group">
                <label>消費項目</label>
                <div class="input-wrapper">
                    <i class="fas fa-tag"></i>
                    <input type="text" id="item" placeholder="填寫項目" required>
                </div>
            </div>

            <div class="form-group">
                <label>類別</label>
                <div class="input-wrapper">
                    <i class="fas fa-layer-group"></i>
                    <select id="category">
                        <option value="餐飲美食">餐飲美食</option>
                        <option value="交通出行">交通出行</option>
                        <option value="生活用品">生活用品</option>
                        <option value="其他支出">其他支出</option>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label>金額</label>
                <div class="input-wrapper">
                    <i class="fas fa-dollar-sign"></i>
                    <input type="number" id="amount" placeholder="0" inputmode="numeric" required>
                </div>
            </div>

            <div class="form-group">
                <label>備註</label>
                <div class="input-wrapper">
                    <i class="fas fa-comment-dots"></i>
                    <input type="text" id="note" placeholder="可選填">
                </div>
            </div>

            <button type="submit" id="submitBtn">
                <i class="fas fa-paper-plane"></i> <span>確認送出</span>
            </button>
        </form>
        <a href="https://docs.google.com/spreadsheets/d/1-LfpoUZpZv0Bm52dQH9EFv8KlPWlA_efe4Jp7wrjmic/edit?usp=sharing">記帳表單</a>
    </div>

    <script>
        // ！！！請替換成你的 Google Apps Script 部署網址 ！！！
        const webAppUrl = 'https://script.google.com/macros/s/AKfycbxYYnLHDIHjoJBUUotKR67TOP9bYAfYVWGwHmn1kRF_s1rliB0Rn_Cxhntnh_pQf5Uu/exec';

        // 快捷填入函式
        function quickFill(itemName, categoryName) {
            document.getElementById('item').value = itemName;
            document.getElementById('category').value = categoryName;
            // 自動聚焦到金額欄位，方便直接輸入數字
            document.getElementById('amount').focus();
        }

        document.getElementById('expenseForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const btnText = btn.querySelector('span');
            
            btn.disabled = true;
            btnText.innerText = '同步中...';

            const params = new URLSearchParams();
            params.append('item', document.getElementById('item').value);
            params.append('category', document.getElementById('category').value);
            params.append('amount', document.getElementById('amount').value);
            params.append('note', document.getElementById('note').value);

            fetch(webAppUrl, {
                method: 'POST',
                mode: 'no-cors',
                body: params
            }).then(() => {
                const successMsg = document.getElementById('successMsg');
                successMsg.style.display = 'block';
                setTimeout(() => { successMsg.style.display = 'none'; }, 2500);
                
                document.getElementById('expenseForm').reset();
                btn.disabled = false;
                btnText.innerText = '確認送出';
            }).catch(err => {
                alert('連線失敗');
                btn.disabled = false;
                btnText.innerText = '確認送出';
            });
        });
    </script>
</body>
</html>
